name: Cosign keyless OIDC release signing

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

# Least-privilege default for the whole workflow; the signing job opts into the
# extra write scopes it actually needs (OpenSSF Scorecard Token-Permissions).
permissions:
  contents: read

jobs:
  sign:
    name: Sign container image (keyless OIDC)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # push/sign image to GHCR
      id-token: write     # OIDC keyless signing
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign container image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          echo "Signing ${IMAGE}"
          cosign sign --yes "${IMAGE}"

      - name: Verify signature
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${IMAGE}"
