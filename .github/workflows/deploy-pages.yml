name: deploy-docs-pages

# Build the VitePress docs site and deploy to GitHub Pages.
# Install uses `npm ci` (lock-file-exact, reproducible).
# Root cause of prior ERESOLVE: package.json pinned markdown-it-mathjax3 ^5,
# but vitepress 1.6.x declares an (optional) peer markdown-it-mathjax3 ^4.
# Under npm 10 this peer conflict is fatal for `npm ci`. Fix = pin
# markdown-it-mathjax3 to ^4.3.2 (satisfies the peer) and regenerate the
# lockfile. No --legacy-peer-deps / --force bandaid is used.
#
# Founder one-time action: repo Settings -> Pages -> Source = "GitHub Actions".
# Then (optional) set a custom domain docs.szlholdings.com (see DNS plan).
#
# Doctrine v11 LOCKED 749/14/163 locked_at c7c0ba17. Author: Yachay.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Build docs
        run: |
          node node_modules/vitepress/bin/vitepress.js build docs
          node fix-relative-paths.mjs
      - name: Add .nojekyll and CNAME
        run: |
          touch docs/.vitepress/dist/.nojekyll
          # Custom domain (enable once DNS CNAME docs.szlholdings.com is set):
          # echo "docs.szlholdings.com" > docs/.vitepress/dist/CNAME
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
