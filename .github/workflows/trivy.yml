name: Trivy + Grype container vulnerability scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

# Least-privilege default; each scan job opts into security-events:write only
# because it uploads a SARIF to the Security tab (OpenSSF Scorecard Token-Permissions).
permissions:
  contents: read

jobs:
  trivy-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload Trivy SARIF
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'  # Don't fail on scan (gate in grype job)

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy-results.sarif

  grype-gate:
    name: Grype CVE gate (fail on HIGH/CRITICAL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload Grype SARIF
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan with Grype (fail build on HIGH/CRITICAL)
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: "."
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        # anchore/scan-action only writes results.sarif when vulnerabilities are found;
        # when 0 HIGH/CRITICAL matches exist the scan passes cleanly and no file is created.
        # Guard the upload so a clean scan does not fail the workflow.
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif
